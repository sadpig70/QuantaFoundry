name: QPGF Seal Gate

# Stage 3 W3.5 [EXT] — PR 이 registry 결정론을 깨면 머지 차단.
# CI gate = "로컬 재현 성공해야 제출"(registry_root_hash byte-identity).
# 외부 라이브러리 파일럿 협업은 relay 의존(정욱님).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  seal-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deterministic deps
        run: pip install -r requirements-ci.txt

      - name: Independent oracle (pure-numpy, 71/71 modules)
        run: python scripts/second_oracle.py

      - name: Convention-independence (규약 변주 하 seal 재현 + teeth, V08_5)
        run: python scripts/inverted_second_oracle.py --quick

      - name: Resource witness (봉인 resource == 자식 resource 합, V08_4)
        run: python scripts/resource_witness.py --quick

      # 전수 재현 — perm-subspace(V08 P0)·convention·resource witness 스텝을 내부 포함.
      # root 대조는 아래 seal-gate 스텝(EXPECT_DEFAULT, anchor_sync 관리)이 담당한다.
      - name: Full reproduction (byte-identity; incl. perm-subspace V08 P0)
        run: python scripts/qf_cli.py reproduce

      - name: Contested-guard determinism (frozen consensus keys)
        run: python scripts/verify_contested_guard.py

      - name: QASM export round-trip (export honesty)
        run: python scripts/qasm_export.py --all

      # root gate: 정적 앵커 하드코딩 금지(anchor drift 방지) — seal_gate_ci.py 의
      # EXPECT_DEFAULT(anchor_sync 가 갱신)를 사용. root 결정론 깨지면 여기서 머지 차단.
      - name: Seal badge + root gate (EXPECT_DEFAULT, anchor_sync-managed)
        run: python scripts/seal_gate_ci.py

      - name: Upload seal badge
        uses: actions/upload-artifact@v4
        with:
          name: seal-badge
          path: .pgf/adoption/seal-badge.json
